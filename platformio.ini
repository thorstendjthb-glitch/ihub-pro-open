; PlatformIO-Build für die iHub-Pro ESP-IDF-Firmware.
; Nutzt die bereits installierte pioarduino-Plattform (ESP-IDF 5.5.4).
[platformio]
src_dir = main

[env:ihub]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = espidf
board_build.partitions = partitions.csv
board_upload.flash_size = 8MB
monitor_speed = 115200
; Komprimiert das Dashboard-HTML vor jedem Build → main/webui_html_gz.h
extra_scripts = pre:gzip_dashboard.py
